<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Sueldos</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .formulario{
            width: 350px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>

</head>
<body>

    <div class="formulario">

        <h2>Formulario de Empleados</h2>

        <form>

            <label>Nombres:</label>
            <input type="text" placeholder="Ingrese nombres">

            <label>Apellidos:</label>
            <input type="text" placeholder="Ingrese apellidos">

            <label>Sueldo:</label>
            <input type="number" placeholder="Ingrese sueldo">

            <button type="submit">Guardar</button>

        </form>

    </div>

</body>
</html>
